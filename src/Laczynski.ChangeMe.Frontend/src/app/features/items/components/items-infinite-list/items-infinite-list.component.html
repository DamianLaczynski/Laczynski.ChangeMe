<div class="items-infinite-list-container">
  <!-- Header with search -->
  <div class="items-header">
    <div class="header-title">
      <h2>Lista elementów (nieskończony scroll)</h2>
      <div class="view-switcher">
        <a routerLink="/items" class="view-link">📋 Tabela</a>
        <a routerLink="/items/infinite" class="view-link active">📱 Lista</a>
      </div>
    </div>

    <div class="header-actions">
      <div class="search-container">
        <input
          type="text"
          class="search-input"
          placeholder="Szukaj elementów..."
          [(ngModel)]="searchTerm"
          (input)="onSearchChange()"
        />
      </div>

      <button type="button" class="btn-primary" (click)="onAddNewItem()">
        <span class="btn-icon">+</span>
        Dodaj element
      </button>
    </div>
  </div>

  <!-- State container with infinite list -->
  <app-state-container
    [$state]="itemsState()"
    [$loadingMessage]="'Ładowanie elementów...'"
    [$emptyMessage]="'Brak elementów do wyświetlenia'"
    [$showEmptyState]="true"
    [$minHeight]="'400px'"
  >
    <ng-template #contentTemplate let-data>
      <app-infinity-list
        [config]="listConfig()"
        (itemSelect)="onItemSelect($event)"
      ></app-infinity-list>
    </ng-template>
  </app-state-container>

  <!-- Item template for the infinite list -->
  <ng-template #itemTemplate let-item>
    <div class="item-card">
      <div class="item-image">
        <img
          [src]="item.image"
          [alt]="item.name"
          class="item-thumbnail"
          (error)="onImageError($event)"
        />
      </div>

      <div class="item-content">
        <div class="item-header">
          <h3 class="item-name">{{ item.name }}</h3>
          <div class="item-price">
            <span class="price-value">{{
              item.price | currency: 'PLN' : 'symbol' : '1.2-2' : 'pl'
            }}</span>
          </div>
        </div>

        <p class="item-description">{{ item.description }}</p>

        <div class="item-actions">
          <button
            type="button"
            class="btn-action btn-edit"
            [title]="'Edytuj ' + item.name"
            (click)="onEditItem(item); $event.stopPropagation()"
          >
            ✏️ Edytuj
          </button>

          <button
            type="button"
            class="btn-action btn-delete"
            [title]="'Usuń ' + item.name"
            (click)="onDeleteItem(item); $event.stopPropagation()"
          >
            🗑️ Usuń
          </button>
        </div>
      </div>
    </div>
  </ng-template>
</div>
