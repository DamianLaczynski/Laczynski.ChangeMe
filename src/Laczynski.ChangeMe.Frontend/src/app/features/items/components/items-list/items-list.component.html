<div class="m-lg">
  <div class="row row--no-gutters row--justify-content-between gap-sm">
    <app-text
      size="sm"
      placeholder="Search items..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
    />

    <app-button size="sm" (click)="onAddNewItem()"> Add item </app-button>
  </div>

  <!-- Direct table without state container wrapper -->
  <app-paginated-table
    [config]="tableConfig()"
    [columnTemplates]="getColumnTemplates()"
    (rowSelect)="onItemSelect($event)"
  ></app-paginated-table>

  <!-- Image template -->
  <ng-template #imageTemplate let-item>
    <div class="item-image">
      <img
        [src]="item.image"
        [alt]="item.name"
        class="item-thumbnail"
        (error)="onImageError($event)"
      />
    </div>
  </ng-template>

  <!-- Price template -->
  <ng-template #priceTemplate let-item>
    <div class="item-price">
      <span class="price-value">{{
        item.price | currency: 'PLN' : 'symbol' : '1.2-2' : 'pl'
      }}</span>
    </div>
  </ng-template>

  <!-- Actions template -->
  <ng-template #actionsTemplate let-item>
    <div class="item-actions">
      <app-button variant="ghost" size="sm" (click)="onEditItem(item)">
        <svg
          class="action-icon"
          fill="currentColor"
          viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </app-button>

      <app-button variant="ghost" size="sm" (click)="onDeleteItem(item)">
        <svg
          class="action-icon"
          fill="currentColor"
          viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"
            clip-rule="evenodd"
          ></path>
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </app-button>
    </div>
  </ng-template>
</div>
<app-modal [(visible)]="modalVisible" [closable]="false">
  <app-item-form
    [itemId]="selectedItemId()"
    (updated)="onUpdated()"
    (closed)="modalVisible.set(false)"
  ></app-item-form>
</app-modal>
<app-modal [(visible)]="addNewItemModalVisible" [closable]="false">
  <app-item-form
    (updated)="onUpdated()"
    (closed)="addNewItemModalVisible.set(false)"
  ></app-item-form>
</app-modal>
