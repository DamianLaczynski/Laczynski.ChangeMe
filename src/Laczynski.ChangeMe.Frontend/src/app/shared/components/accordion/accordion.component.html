<div class="accordion" [class]="accordionClasses()">
  <!-- Accordion Header using Node Component -->
  <app-tree-node
    [node]="accordionNode()"
    [size]="size()"
    [showChevron]="true"
    [chevronPosition]="chevronPosition()"
    [chevronIconCollapsed]="chevronPosition() === 'before' ? 'chevron_right' : 'chevron_down'"
    [chevronIconExpanded]="chevronPosition() === 'before' ? 'chevron_down' : 'chevron_up'"
    [asButton]="true"
    [expandOnClick]="true"
    [selectOnClick]="false"
    (nodeToggle)="onNodeToggle($event)"
  />

  <!-- Accordion Panel -->
  <div class="accordion__panel">
    <div class="accordion__panel-content">
      <ng-content></ng-content>
    </div>
  </div>
</div>
