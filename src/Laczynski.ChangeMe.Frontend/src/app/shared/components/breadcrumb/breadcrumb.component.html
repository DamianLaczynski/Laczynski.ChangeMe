<nav [class]="breadcrumbClasses()" [attr.aria-label]="ariaLabel()">
  <ol class="breadcrumb__list">
    @for (item of items(); track item.id; let isLast = $last) {
      <li class="breadcrumb__item">
        <!-- Breadcrumb Button -->
        <button
          [class]="itemClasses(item)"
          [attr.aria-current]="item.selected ? 'page' : null"
          [attr.aria-disabled]="item.disabled"
          [disabled]="item.disabled"
          (click)="onItemClick(item)"
          type="button"
        >
          <!-- Icon (if provided) -->
          @if (showIcons() && item.icon) {
            <div class="breadcrumb__icon">
              @if (item.selected) {
                <app-icon [icon]="item.icon" [size]="size()" variant="filled" />
              } @else {
                <app-icon [icon]="item.icon" [size]="size()" variant="regular" />
              }
            </div>
          }

          <!-- Text -->
          <div class="breadcrumb__text-wrapper">
            <div class="breadcrumb__text">
              {{ item.label }}
            </div>
          </div>
        </button>

        <!-- Divider (chevron) - not shown for last item -->
        @if (!isLast) {
          <div class="breadcrumb__divider">
            <app-icon [icon]="'chevron_right'" [size]="size()" variant="regular" />
          </div>
        }
      </li>
    }
  </ol>
</nav>
