<nav [class]="breadcrumbClasses()" [attr.aria-label]="ariaLabel()">
  <ol class="breadcrumb__list">
    @for (item of items(); track item.id; let isLast = $last) {
      <li class="breadcrumb__item">
        <!-- Breadcrumb Button -->
        <button
          [class]="itemClasses(item)"
          [attr.aria-current]="item.current ? 'page' : null"
          [attr.aria-disabled]="item.disabled"
          [disabled]="item.disabled"
          (click)="onItemClick(item)"
          type="button"
        >
          <!-- Icon (if provided) -->
          @if (showIcons() && item.icon) {
            <div class="breadcrumb__icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                @if (item.current) {
                  <!-- Filled icon for current item -->
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M10 18C14.4183 18 18 14.4183 18 10C18 5.58172 14.4183 2 10 2C5.58172 2 2 5.58172 2 10C2 14.4183 5.58172 18 10 18Z"
                    fill="currentColor"
                  />
                } @else {
                  <!-- Regular icon for other items -->
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M10 18C14.4183 18 18 14.4183 18 10C18 5.58172 14.4183 2 10 2C5.58172 2 2 5.58172 2 10C2 14.4183 5.58172 18 10 18ZM10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10C17 13.866 13.866 17 10 17Z"
                    fill="currentColor"
                  />
                }
              </svg>
            </div>
          }

          <!-- Text -->
          <div class="breadcrumb__text-wrapper">
            <div class="breadcrumb__text">
              {{ item.label }}
            </div>
          </div>
        </button>

        <!-- Divider (chevron) - not shown for last item -->
        @if (!isLast) {
          <div class="breadcrumb__divider">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M7.64582 4.14708C7.84073 3.95147 8.15731 3.9509 8.35292 4.14582L13.8374 9.6108C14.0531 9.82574 14.0531 10.1751 13.8374 10.39L8.35292 15.855C8.15731 16.0499 7.84073 16.0493 7.64582 15.8537C7.4509 15.6581 7.45147 15.3415 7.64708 15.1466L12.8117 10.0004L7.64708 4.85418C7.45147 4.65927 7.4509 4.34269 7.64582 4.14708Z"
                fill="currentColor"
              />
            </svg>
          </div>
        }
      </li>
    }
  </ol>
</nav>
