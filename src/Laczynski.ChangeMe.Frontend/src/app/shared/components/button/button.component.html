<button
  [type]="type()"
  [class]="buttonClasses()"
  [disabled]="disabled()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-pressed]="selected() ? 'true' : null"
  (click)="onClick($event)"
>
  @if (icon()) {
    <app-icon [icon]="icon()" [size]="size()" />
  }
  <ng-content></ng-content>
</button>
