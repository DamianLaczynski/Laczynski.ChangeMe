<nav
  [class]="navClasses()"
  [style.width.px]="getCurrentWidth()"
  style="height: 100vh; overflow: auto"
>
  <!-- Hamburger Button (only if collapsible) -->
  @if (collapsible()) {
    <app-button
      [fullWidth]="true"
      [icon]="'navigation'"
      variant="subtle"
      (click)="onHamburgerClick($event)"
    ></app-button>
  }

  <!-- Content Area -->
  <div [class]="contentClasses()" role="navigation" aria-label="Main navigation">
    <!-- Auto-rendered items if provided -->
    @if (items().length > 0) {
      @for (item of items(); track item.id || item.label; let i = $index) {
        @if (item.isSectionHeader) {
          <app-nav-section-header [label]="item.label" />
        } @else if (item.isDivider) {
          <app-divider orientation="horizontal" />
        } @else {
          <!-- Main navigation items -->
          <app-tree-node
            [node]="$any(item)"
            [size]="item.size || 'medium'"
            [asButton]="true"
            [showSelectionIndicator]="true"
            [iconOnly]="isCollapsed()"
            [showChevron]="!!(item.children && item.children.length > 0)"
            [chevronPosition]="'after'"
            [chevronIconCollapsed]="'chevron_down'"
            [chevronIconExpanded]="'chevron_up'"
            [expandOnClick]="!!(item.children && item.children.length > 0)"
            [selectOnClick]="!(item.children && item.children.length > 0)"
            (nodeClick)="onItemClick($event)"
          >
          </app-tree-node>
        }
      }
    } @else {
      <!-- Custom content via ng-content -->
      <ng-content></ng-content>
    }
  </div>
</nav>
