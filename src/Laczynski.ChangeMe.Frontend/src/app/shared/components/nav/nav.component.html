<nav
  [class]="navClasses()"
  [style.width.px]="getCurrentWidth()"
  style="height: 100vh; overflow: auto"
>
  <!-- Hamburger Button (only if collapsible) -->
  @if (collapsible()) {
    <button
      type="button"
      [class]="hamburgerClasses()"
      [attr.aria-label]="isCollapsed() ? 'Expand navigation' : 'Collapse navigation'"
      [attr.aria-expanded]="!isCollapsed()"
      (click)="onHamburgerClick($event)"
    >
      <svg
        class="nav__hamburger-icon"
        width="20"
        height="20"
        viewBox="0 0 20 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M2 4.5C2 4.22386 2.22386 4 2.5 4H17.5C17.7761 4 18 4.22386 18 4.5C18 4.77614 17.7761 5 17.5 5H2.5C2.22386 5 2 4.77614 2 4.5ZM2 9.5C2 9.22386 2.22386 9 2.5 9H17.5C17.7761 9 18 9.22386 18 9.5C18 9.77614 17.7761 10 17.5 10H2.5C2.22386 10 2 9.77614 2 9.5ZM2.5 14C2.22386 14 2 14.2239 2 14.5C2 14.7761 2.22386 15 2.5 15H17.5C17.7761 15 18 14.7761 18 14.5C18 14.2239 17.7761 14 17.5 14H2.5Z"
          fill="currentColor"
        />
      </svg>
    </button>
  }

  <!-- Content Area -->
  <div
    [class]="contentClasses()"
    (keydown)="onContentKeyDown($event)"
    role="navigation"
    aria-label="Main navigation"
  >
    <!-- Auto-rendered items if provided -->
    @if (items().length > 0) {
      @for (item of items(); track item.id || item.label; let i = $index) {
        <!-- Main navigation items -->
        <app-tree-node
          [node]="$any(item)"
          [size]="item.size || 'medium'"
          [asButton]="true"
          [showSelectionIndicator]="true"
          [iconOnly]="isCollapsed()"
          [showChevron]="!!(item.children && item.children.length > 0)"
          [chevronPosition]="'after'"
          [chevronIconCollapsed]="'chevron_down'"
          [chevronIconExpanded]="'chevron_up'"
          [expandOnClick]="!!(item.children && item.children.length > 0)"
          [selectOnClick]="!(item.children && item.children.length > 0)"
          [attr.tabindex]="i === 0 ? 0 : -1"
          (nodeClick)="onItemClick($event)"
          (focus)="onNavItemFocus(i)"
        >
        </app-tree-node>
      }
    } @else {
      <!-- Custom content via ng-content -->
      <ng-content></ng-content>
    }
  </div>
</nav>
