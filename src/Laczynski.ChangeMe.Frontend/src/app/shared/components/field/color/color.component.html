<app-field
  [fieldType]="'color'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
  [inlineEdit]="inlineEdit()"
  [displayValue]="getDisplayValue()"
  [isEditModeValue]="isEditMode()"
  (enterEdit)="enterEditMode()"
>
  <!-- Color Input (for both inline edit mode and normal mode) -->
  @if (!inlineEdit() || isEditMode()) {
    <div class="input-wrapper" [class]="wrapperClasses">
      <!-- Color Preview -->
      @if (value) {
        <app-icon
          [icon]="'square'"
          [size]="size()"
          variant="filled"
          [style.color]="value ? colorDisplayValue() : 'inherit'"
          class="color-preview"
          (click)="!isEditMode() ? togglePanel() : null"
        ></app-icon>
      }

      <input
        #triggerElement
        class="input"
        type="text"
        [id]="id()"
        [name]="name()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="disabled() && !isEditMode()"
        [readonly]="readonly() && !isEditMode()"
        [value]="value || ''"
        [attr.aria-label]="ariaLabel() || label()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.aria-invalid]="state() === 'error'"
        [attr.aria-expanded]="isExpanded()"
        [attr.aria-haspopup]="'dialog'"
        (click)="!isEditMode() && !disabled() && !readonly() ? togglePanel() : null"
        (input)="onColorInputChange($event)"
        (blur)="onBlur($event)"
        (focus)="onFocus($event)"
        (keydown)="onKeyDown($event)"
      />

      <!-- Actions: Cancel button for inline edit mode -->
      @if (inlineEdit() && isEditMode()) {
        <div class="field__actions">
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            [attr.aria-label]="'Cancel editing'"
            (click)="cancelChanges()"
            (mousedown)="onCancelButtonMouseDown($event)"
          ></app-action-button>
        </div>
      }
      <!-- Actions: Eye dropper, color picker and clear button for normal mode -->
      @if (!inlineEdit() && !disabled() && !readonly()) {
        <div class="field__actions">
          <!-- Eye Dropper Button -->
          @if (showEyeDropper() && isEyeDropperSupported()) {
            <app-action-button
              [show]="true"
              [icon]="'eyedropper'"
              [size]="size()"
              (click)="openEyeDropper()"
            ></app-action-button>
          }
          <!-- Color Picker Icon Button -->
          <app-action-button
            [show]="true"
            [icon]="'color'"
            [size]="size()"
            (click)="togglePanel()"
          ></app-action-button>

          <!-- Clear Button -->
          @if (value) {
            <app-action-button
              [show]="true"
              [icon]="'dismiss'"
              [size]="size()"
              (click)="clear()"
            ></app-action-button>
          }
        </div>
      }
    </div>
  }

  <!-- Color Picker Panel -->
  @if (isExpanded()) {
    <div #colorPanel class="color-panel" [attr.data-size]="size()">
      <!-- Saturation & Lightness Picker -->
      <div
        #saturationPicker
        class="color-picker"
        [style.background-color]="getHueColor()"
        (mousedown)="onSaturationPickerMouseDown($event)"
      >
        <div class="color-picker__overlay color-picker__overlay--white"></div>
        <div class="color-picker__overlay color-picker__overlay--black"></div>
        <div
          class="color-picker__handle"
          [style.left.px]="pickerX()"
          [style.top.px]="pickerY()"
        ></div>
      </div>

      <!-- Hue Slider -->
      <div class="color-slider">
        <label class="color-slider__label" [attr.for]="id() + '-hue'">Hue</label>
        <input
          type="range"
          class="color-slider__input color-slider__input--hue"
          [id]="id() + '-hue'"
          min="0"
          max="360"
          [value]="hueValue()"
          (input)="onHueChange($event)"
        />
      </div>

      <!-- Alpha Slider -->
      @if (showAlpha()) {
        <div class="color-slider">
          <label class="color-slider__label" [attr.for]="id() + '-alpha'">Opacity</label>
          <div class="color-slider__alpha-wrapper">
            <div class="color-slider__alpha-checkered"></div>
            <input
              type="range"
              class="color-slider__input color-slider__input--alpha"
              [id]="id() + '-alpha'"
              min="0"
              max="1"
              step="0.01"
              [value]="alphaValue()"
              [style.background]="
                'linear-gradient(to right, transparent, ' + currentColor().hex + ')'
              "
              (input)="onAlphaChange($event)"
            />
          </div>
        </div>
      }
    </div>
  }
</app-field>
