<div class="radio-wrapper" [ngClass]="radioClasses">
  <label class="radio-container">
    <input
      type="radio"
      [id]="id()"
      [name]="name()"
      [value]="value()"
      [checked]="isChecked"
      [disabled]="disabled()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.required]="required() ? true : null"
      class="radio-input"
      (change)="onRadioChange($event)"
      (click)="onRadioClick($event)"
    />

    @if (!isChecked) {
      <app-icon [icon]="'circle'" [size]="size()" />
    }

    @if (isChecked) {
      <app-icon [icon]="'checkmark_circle'" [size]="size()" variant="filled" />
    }

    @if (label()) {
      <span
        class="radio-label"
        [class.radio-label--disabled]="disabled()"
        [class.radio-label--required]="required()"
      >
        {{ label() }}
      </span>
    }
  </label>
</div>
