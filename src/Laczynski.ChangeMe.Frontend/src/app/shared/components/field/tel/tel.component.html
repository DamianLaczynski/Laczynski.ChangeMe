<app-field
  [fieldType]="'tel'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [layout]="layout()"
  [size]="size()"
>
  <input
    [id]="id()"
    [name]="name()"
    type="tel"
    class="field__tel-input"
    [class]="inputClasses()"
    [placeholder]="placeholder()"
    [required]="required()"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [autocomplete]="autocomplete()"
    [value]="value"
    (input)="onInputChange($event)"
    (focus)="onFocus($event)"
    (blur)="onBlur($event)"
    (keyup)="onKeyUp($event)"
    (keydown)="onKeyDown($event)"
    #telInput
  />
  @if (!disabled() && !readonly()) {
  <div class="field__actions">
    <app-clear-button
      [value]="value"
      [showClearButton]="showClearButton()"
      (clear)="clear()"
    ></app-clear-button>
  </div>
  }
</app-field>
