<app-field
  [fieldType]="'tel'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
>
  <div class="input-wrapper" [class]="wrapperClasses">
    <input
      class="input"
      type="tel"
      [id]="id()"
      [name]="name()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [autocomplete]="autocomplete() || 'tel'"
      [value]="value"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-invalid]="state() === 'error'"
      (input)="onInputChange($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      (keyup)="onKeyUp($event)"
      (keydown)="onKeyDown($event)"
    />
    @if (!disabled() && !readonly()) {
      <div class="field__actions">
        @if (value) {
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            (click)="clear()"
          ></app-action-button>
        }
        <app-action-button [show]="true" [icon]="'call'" [size]="size()"></app-action-button>
      </div>
    }
  </div>
</app-field>
