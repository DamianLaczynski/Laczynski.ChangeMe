<app-field
  [fieldType]="'tel'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
>
  <input
    class="input"
    type="tel"
    [id]="id()"
    [name]="name()"
    [placeholder]="placeholder()"
    [required]="required()"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [autocomplete]="autocomplete()"
    [value]="value"
    [attr.aria-label]="ariaLabel() || label()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-invalid]="state() === 'error'"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (focus)="onFocus($event)"
    (keyup)="onKeyUp($event)"
    (keydown)="onKeyDown($event)"
  />
  @if (!disabled() && !readonly()) {
    <div class="field__actions">
      <app-clear-button
        [value]="value"
        [showClearButton]="showClearButton()"
        (clear)="clear()"
      ></app-clear-button>
    </div>
  }
</app-field>
