<app-field
  [fieldType]="'number'"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
>
  <div class="checkbox-wrapper" [ngClass]="checkboxClasses">
    <label class="checkbox-container">
      <!-- Hidden native checkbox for accessibility and form integration -->
      <input
        type="checkbox"
        [id]="id()"
        [name]="name()"
        [checked]="isChecked"
        [indeterminate]="isIndeterminate"
        [disabled]="disabled()"
        [attr.aria-label]="ariaLabel() || label()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.required]="required() ? true : null"
        class="checkbox-input"
        (change)="onCheckboxChange($event)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (click)="onCheckboxClick($event)"
      />

      <!-- Visual checkbox element -->
      <div class="checkbox-visual">
        <!-- Standard Style SVGs -->
        @if (checkboxStyle() === 'standard') {
          <!-- Unchecked -->
          @if (isUnchecked) {
            <app-icon [icon]="'checkbox_unchecked'" [size]="size()" />
          }

          <!-- Checked -->
          @if (isChecked) {
            <app-icon [icon]="'checkbox_checked'" [size]="size()" variant="filled" />
          }

          <!-- Indeterminate -->
          @if (isIndeterminate) {
            <app-icon [icon]="'subtract_square'" [size]="size()" />
          }
        }

        <!-- Circular Style SVGs -->
        @if (checkboxStyle() === 'circular') {
          <!-- Unchecked -->
          @if (isUnchecked) {
            <app-icon [icon]="'circle'" [size]="size()" />
          }

          <!-- Checked -->
          @if (isChecked) {
            <app-icon [icon]="'checkmark_circle'" [size]="size()" variant="filled" />
          }

          <!-- Indeterminate -->
          @if (isIndeterminate) {
            <app-icon [icon]="'subtract_circle'" [size]="size()" />
          }
        }
      </div>

      <!-- Label text -->
      @if (label()) {
        <span
          class="checkbox-label"
          [class.checkbox-label--disabled]="disabled()"
          [class.checkbox-label--required]="required()"
        >
          {{ label() }}
        </span>
      }
    </label>
  </div>
</app-field>
