<app-field
  [fieldType]="'number'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
>
  <div class="input-wrapper" [class]="wrapperClasses">
    <input
      class="input number-input"
      type="number"
      inputmode="numeric"
      [id]="id()"
      [name]="name()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [autocomplete]="autocomplete()"
      [value]="value"
      [attr.min]="min()"
      [attr.max]="max()"
      [attr.step]="step()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-invalid]="state() === 'error'"
      (input)="onInputChange($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      (keyup)="onKeyUp($event)"
      (keydown)="onKeyDown($event)"
    />
    @if (!disabled() && !readonly()) {
      <div class="field__actions">
        @if (value) {
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            (click)="clear()"
          ></app-action-button>
        }
        <div class="field__action" style="display: flex; flex-direction: column">
          <app-action-button
            [ngClass]="getStepperClasses()"
            [show]="true"
            [icon]="'chevron_up'"
            [size]="size()"
            (click)="increment()"
          />
          <app-action-button
            [ngClass]="getStepperClasses()"
            [show]="true"
            [icon]="'chevron_down'"
            [size]="size()"
            (click)="decrement()"
          />
        </div>
      </div>
    }
  </div>
</app-field>
