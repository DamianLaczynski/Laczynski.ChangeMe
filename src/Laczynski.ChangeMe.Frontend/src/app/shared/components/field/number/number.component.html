<app-field
  [fieldType]="'number'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
  [inlineEdit]="inlineEdit()"
  [displayValue]="getDisplayValue()"
  [isEditModeValue]="isEditMode()"
  (enterEdit)="enterEditMode()"
>
  <!-- Input (for both inline edit mode and normal mode) -->
  @if (!inlineEdit() || isEditMode()) {
    <div class="input-wrapper" [class]="wrapperClasses">
      <input
        #inputElement
        class="input number-input"
        type="number"
        inputmode="numeric"
        [id]="id()"
        [name]="name()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="disabled() && !isEditMode()"
        [readonly]="readonly() && !isEditMode()"
        [autocomplete]="autocomplete()"
        [value]="value"
        [attr.min]="min()"
        [attr.max]="max()"
        [attr.step]="step()"
        [attr.aria-label]="ariaLabel() || label()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.aria-invalid]="state() === 'error'"
        (input)="onInputChange($event)"
        (blur)="onBlur($event)"
        (focus)="onFocus($event)"
        (keyup)="onKeyUp($event)"
        (keydown)="onKeyDown($event)"
      />
      <!-- Actions: Cancel button for inline edit mode -->
      @if (inlineEdit() && isEditMode()) {
        <div class="field__actions">
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            [attr.aria-label]="'Cancel editing'"
            (click)="cancelChanges()"
            (mousedown)="onCancelButtonMouseDown($event)"
          ></app-action-button>
        </div>
      }
      <!-- Actions: Clear button and stepper for normal mode -->
      @if (!inlineEdit() && !disabled() && !readonly()) {
        <div class="field__actions">
          @if (value) {
            <app-action-button
              [show]="true"
              [icon]="'dismiss'"
              [size]="size()"
              (click)="clear()"
            ></app-action-button>
          }
          <div class="field__action" style="display: flex; flex-direction: column">
            <app-action-button
              [ngClass]="getStepperClasses()"
              [show]="true"
              [icon]="'chevron_up'"
              [size]="size()"
              (click)="increment()"
            />
            <app-action-button
              [ngClass]="getStepperClasses()"
              [show]="true"
              [icon]="'chevron_down'"
              [size]="size()"
              (click)="decrement()"
            />
          </div>
        </div>
      }
    </div>
  }
</app-field>
