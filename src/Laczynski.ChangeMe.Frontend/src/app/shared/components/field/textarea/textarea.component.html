<app-field
  [fieldType]="'textarea'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
  [inlineEdit]="inlineEdit()"
  [displayValue]="getDisplayValue()"
  [isEditModeValue]="isEditMode()"
  (enterEdit)="enterEditMode()"
>
  <!-- Textarea (for both inline edit mode and normal mode) -->
  @if (!inlineEdit() || isEditMode()) {
    <div class="input-wrapper" [class]="wrapperClasses">
      <textarea
        #textareaElement
        class="input"
        [id]="id()"
        [name]="name()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="disabled() && !isEditMode()"
        [readonly]="readonly() && !isEditMode()"
        [rows]="rows()"
        [cols]="cols() || undefined"
        [attr.aria-label]="ariaLabel() || label()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.aria-invalid]="state() === 'error'"
        (input)="onInputChange($event)"
        (blur)="onBlur($event)"
        (focus)="onFocus($event)"
        (keyup)="onKeyUp($event)"
        (keydown)="onKeyDown($event)"
        >{{ value }}</textarea
      >
      <!-- Actions: Cancel button for inline edit mode -->
      @if (inlineEdit() && isEditMode()) {
        <div class="field__actions">
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            [attr.aria-label]="'Cancel editing'"
            (click)="cancelChanges()"
            (mousedown)="onCancelButtonMouseDown($event)"
          ></app-action-button>
        </div>
      }
    </div>
  }
</app-field>
