<app-field
  [fieldType]="'password'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [layout]="layout()"
  [size]="size()"
>
  <!-- Password input -->
  <div class="field__password-input-wrapper">
    <input
      [id]="id()"
      [name]="name()"
      [type]="isPasswordVisible ? 'text' : 'password'"
      class="field__password-input"
      [class]="inputClasses()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [autocomplete]="autocomplete()"
      [value]="value"
      (input)="onInputChange($event)"
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
      (keyup)="onKeyUp($event)"
      (keydown)="onKeyDown($event)"
      #passwordInput
    />

    <!-- Password actions -->
    @if (!disabled() && !readonly()) {
    <div class="field__actions">
      <!-- Clear button -->
      <app-clear-button
        [value]="value"
        [showClearButton]="showClearButton()"
        (clear)="clear()"
      ></app-clear-button>

      <!-- Show/Hide toggle -->
      <app-toggle-button
        [showToggleButton]="showToggleButton()"
        [isPasswordVisible]="isPasswordVisible"
        (togglePasswordVisibility)="togglePasswordVisibility()"
      ></app-toggle-button>
    </div>
    }
  </div>
</app-field>
