<app-field
  [fieldType]="'password'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
>
  <div class="input-wrapper" [class]="wrapperClasses">
    <input
      class="input"
      [type]="inputType"
      [id]="id()"
      [name]="name()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [autocomplete]="autocomplete()"
      [value]="value"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-invalid]="state() === 'error'"
      (input)="onInputChange($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      (keyup)="onKeyUp($event)"
      (keydown)="onKeyDown($event)"
    />
    @if (!disabled() && !readonly()) {
      <div class="field__actions">
        <!-- Toggle Password Visibility Button -->

        @if (showPassword()) {
          <app-action-button
            [show]="true"
            [icon]="'eye'"
            [size]="size()"
            (click)="togglePasswordVisibility()"
          ></app-action-button>
        } @else {
          <app-action-button
            [show]="true"
            [icon]="'eye_off'"
            [size]="size()"
            (click)="togglePasswordVisibility()"
          ></app-action-button>
        }

        @if (value) {
          <!-- Clear Button -->
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            (click)="clear()"
          ></app-action-button>
        }
      </div>
    }
  </div>
</app-field>
