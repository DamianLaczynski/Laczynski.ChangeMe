<app-field
  [fieldType]="'password'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
>
  <!-- Password input -->
  <div class="field__password-input-wrapper">
    <input
      class="input"
      type="password"
      [id]="id()"
      [name]="name()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [autocomplete]="autocomplete()"
      [value]="value"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-invalid]="state() === 'error'"
      (input)="onInputChange($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      (keyup)="onKeyUp($event)"
      (keydown)="onKeyDown($event)"
    />

    <!-- Password actions -->
    @if (!disabled() && !readonly()) {
      <div class="field__actions">
        <!-- Clear button -->
        <app-clear-button
          [value]="value"
          [showClearButton]="showClearButton()"
          (clear)="clear()"
        ></app-clear-button>

        <!-- Show/Hide toggle -->
        <app-toggle-button
          [showToggleButton]="showToggleButton()"
          [isPasswordVisible]="isPasswordVisible"
          (togglePasswordVisibility)="togglePasswordVisibility()"
        ></app-toggle-button>
      </div>
    }
  </div>
</app-field>
