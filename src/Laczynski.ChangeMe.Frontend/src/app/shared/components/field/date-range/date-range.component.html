<app-field
  [fieldType]="'date'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [size]="size()"
  [variant]="variant()"
  [inlineEdit]="inlineEdit()"
  [displayValue]="getDisplayValue()"
  [isEditModeValue]="isEditMode()"
  (enterEdit)="enterEditMode()"
>
  <!-- Date Range Input (for both inline edit mode and normal mode) -->
  @if (!inlineEdit() || isEditMode()) {
    <div class="input-wrapper" [class]="wrapperClasses">
      <input
        #triggerElement
        class="input"
        type="text"
        [id]="id()"
        [name]="name()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="disabled() && !isEditMode()"
        [readonly]="readonly() && !isEditMode()"
        [value]="displayText()"
        [attr.aria-label]="ariaLabel() || label()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.aria-invalid]="state() === 'error'"
        [attr.aria-expanded]="isExpanded()"
        [attr.aria-haspopup]="'dialog'"
        (click)="!isEditMode() ? togglePanel() : null"
        (input)="onDateRangeInputChange($event)"
        (blur)="onBlur($event)"
        (focus)="onFocus($event)"
        (keydown)="onKeyDown($event)"
      />
      <!-- Actions: Cancel button for inline edit mode -->
      @if (inlineEdit() && isEditMode()) {
        <div class="field__actions">
          <app-action-button
            [show]="true"
            [icon]="'dismiss'"
            [size]="size()"
            [attr.aria-label]="'Cancel editing'"
            (click)="cancelChanges()"
            (mousedown)="onCancelButtonMouseDown($event)"
          ></app-action-button>
        </div>
      }
      <!-- Actions: Calendar icon and clear button for normal mode -->
      @if (!inlineEdit() && !disabled() && !readonly()) {
        <div class="field__actions">
          <!-- Calendar Icon Button -->
          <app-action-button
            [show]="true"
            [size]="size()"
            [icon]="'calendar'"
            (click)="togglePanel()"
          ></app-action-button>
          <!-- Clear Button -->
          @if (value && (value.startDate || value.endDate)) {
            <app-action-button
              [show]="true"
              [icon]="'dismiss'"
              [size]="size()"
              (click)="clear()"
            ></app-action-button>
          }
        </div>
      }
    </div>
  }

  <!-- Date Range Picker Panel -->
  @if (isExpanded()) {
    <div
      #datePanel
      class="date-range-panel"
      [attr.data-size]="size()"
      (click)="onPanelClick($event)"
    >
      <!-- Calendar Section -->
      <div class="date-range-panel__calendar">
        <app-calendar
          [currentMonth]="currentMonth()"
          [selectedDate]="null"
          [startDate]="startDate()"
          [endDate]="endDate()"
          [hoveredDate]="hoveredDate()"
          [calendarView]="calendarView()"
          [min]="min()"
          [max]="max()"
          [size]="size()"
          [showMonthYearPicker]="showMonthYearPicker()"
          [isDayInHoverRangeFn]="isDayInHoverRange.bind(this)"
          (dateSelect)="onCalendarDateSelect($event)"
          (monthSelect)="onCalendarMonthSelect($event)"
          (yearSelect)="onCalendarYearSelect($event)"
          (previousMonth)="onCalendarPreviousMonth()"
          (nextMonth)="onCalendarNextMonth()"
          (previousYear)="onCalendarPreviousYear()"
          (nextYear)="onCalendarNextYear()"
          (previousYearRange)="onCalendarPreviousYearRange()"
          (nextYearRange)="onCalendarNextYearRange()"
          (switchToMonthsView)="onCalendarSwitchToMonthsView()"
          (switchToYearsView)="onCalendarSwitchToYearsView()"
          (switchToDaysView)="onCalendarSwitchToDaysView()"
          (dateHover)="onCalendarDateHover($event)"
          (dateLeave)="onCalendarDateLeave()"
        ></app-calendar>
      </div>
    </div>
  }
</app-field>
