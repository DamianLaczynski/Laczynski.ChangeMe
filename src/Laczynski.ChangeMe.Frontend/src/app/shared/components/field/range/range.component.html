<app-field
  [fieldType]="'range'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [warningText]="warningText()"
  [successText]="successText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [state]="state()"
  [layout]="layout()"
  [size]="size()"
>
  <div class="field__range-container">
    <!-- Value display -->
    @if (showValue()) {
    <div class="field__range-value-display">
      <span class="field__range-value">{{ getDisplayValue() }}</span>
      @if (unit()) {
      <span class="field__range-unit">{{ unit() }}</span>
      }
    </div>
    }

    <!-- Range input -->
    <div class="field__range-input-wrapper">
      <input
        [id]="id()"
        [name]="name()"
        type="range"
        class="field__range-input"
        [class]="inputClasses()"
        [min]="min()"
        [max]="max()"
        [step]="step()"
        [value]="value"
        [required]="required()"
        [disabled]="disabled()"
        [readonly]="readonly()"
        (input)="onInputChange($event)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (change)="onRangeChange($event)"
        (keyup)="onKeyUp($event)"
        (keydown)="onKeyDown($event)"
        #rangeInput
      />

      <!-- Custom track styling -->
      <div class="field__range-track">
        <div
          class="field__range-fill"
          [style.width.%]="getFillPercentage()"
        ></div>
        <div
          class="field__range-thumb"
          [style.left.%]="getThumbPosition()"
        ></div>
      </div>
    </div>

    <!-- Min/Max labels -->
    @if (showLabels()) {
    <div class="field__range-labels">
      <span class="field__range-label field__range-label--min">
        {{ getMinLabel() }}
      </span>
      <span class="field__range-label field__range-label--max">
        {{ getMaxLabel() }}
      </span>
    </div>
    }
  </div>
</app-field>
