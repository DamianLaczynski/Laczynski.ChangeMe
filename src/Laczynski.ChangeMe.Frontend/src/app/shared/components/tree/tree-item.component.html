<!-- Tree Item -->
<div
  #treeItem
  [class]="itemClasses()"
  role="treeitem"
  [attr.aria-expanded]="node().hasChildren ? expanded() : null"
  [attr.aria-selected]="node().selected"
  [attr.aria-disabled]="node().disabled"
  [attr.aria-level]="(node().level || 0) + 1"
  [attr.tabindex]="getTabIndex()"
  (click)="onItemClick($event)"
  (keydown)="onKeyDown($event)"
>
  <!-- Chevron (for branch nodes only) -->
  @if (node().hasChildren && !isLeaf()) {
    <div class="tree__chevron" (click)="onChevronClick($event)">
      <svg
        width="12"
        height="12"
        viewBox="0 0 12 12"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M4.64645 2.14645C4.45118 2.34171 4.45118 2.65829 4.64645 2.85355L7.79289 6L4.64645 9.14645C4.45118 9.34171 4.45118 9.65829 4.64645 9.85355C4.84171 10.0488 5.15829 10.0488 5.35355 9.85355L8.85355 6.35355C9.04882 6.15829 9.04882 5.84171 8.85355 5.64645L5.35355 2.14645C5.15829 1.95118 4.84171 1.95118 4.64645 2.14645Z"
          fill="currentColor"
        />
      </svg>
    </div>
  }

  <!-- Content (icon + text) -->
  <div class="tree__content">
    @if (showIcon()) {
      <div class="tree__icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          @if (node().selected) {
            <!-- Filled icon for selected state -->
            <path
              d="M18 10C18 12.0279 17.2454 13.8796 16.0017 15.2897L11.0525 10.4185C10.4687 9.84393 9.53192 9.84393 8.94812 10.4185L3.99855 15.29C2.75469 13.8799 2 12.0281 2 10C2 5.58172 5.58172 2 10 2C14.4183 2 18 5.58172 18 10ZM10.351 11.1312L15.2949 15.9971C13.8843 17.2436 12.0305 18 10 18C7.96969 18 6.11604 17.2437 4.70541 15.9974L9.64959 11.1312C9.84419 10.9397 10.1564 10.9397 10.351 11.1312ZM12.75 8.5C13.4404 8.5 14 7.94036 14 7.25C14 6.55964 13.4404 6 12.75 6C12.0596 6 11.5 6.55964 11.5 7.25C11.5 7.94036 12.0596 8.5 12.75 8.5Z"
              fill="currentColor"
            />
          } @else {
            <!-- Regular icon -->
            <path
              d="M10 3C6.13401 3 3 6.13401 3 10C3 11.7547 3.64565 13.3586 4.71233 14.5872L8.94781 10.4185C9.5316 9.84393 10.4684 9.84393 11.0522 10.4185L15.2877 14.5872C16.3544 13.3586 17 11.7547 17 10C17 6.13401 13.866 3 10 3ZM10 17C11.7513 17 13.3525 16.3568 14.5801 15.2938L10.3507 11.1312C10.1561 10.9397 9.84387 10.9397 9.64927 11.1312L5.41994 15.2938C6.64753 16.3568 8.24866 17 10 17ZM2 10C2 5.58172 5.58172 2 10 2C14.4183 2 18 5.58172 18 10C18 14.4183 14.4183 18 10 18C5.58172 18 2 14.4183 2 10ZM13 7.5C13 7.22386 12.7761 7 12.5 7C12.2239 7 12 7.22386 12 7.5C12 7.77614 12.2239 8 12.5 8C12.7761 8 13 7.77614 13 7.5ZM14 7.5C14 8.32843 13.3284 9 12.5 9C11.6716 9 11 8.32843 11 7.5C11 6.67157 11.6716 6 12.5 6C13.3284 6 14 6.67157 14 7.5Z"
              fill="currentColor"
            />
          }
        </svg>
      </div>
    }

    <div class="tree__text">
      {{ node().label }}
    </div>
  </div>

  <!-- Quick Actions (slot for action buttons) -->
  @if (showQuickActions() && quickActionsTemplate()) {
    <div class="tree__quick-actions">
      <ng-container
        *ngTemplateOutlet="quickActionsTemplate()!; context: { $implicit: node() }"
      ></ng-container>
    </div>
  }
</div>

<!-- Children (recursive) -->
@if (expanded() && node().hasChildren && node().children && node().children!.length > 0) {
  <div class="tree__children" role="group">
    @for (child of node().children; track child.id) {
      <app-tree-item
        [node]="child"
        [size]="size()"
        [showIcon]="showIcon()"
        [showQuickActions]="showQuickActions()"
        [quickActionsTemplate]="quickActionsTemplate() || null"
        [focusedNodeId]="focusedNodeId()"
        (nodeClick)="nodeClick.emit($event)"
        (nodeToggle)="nodeToggle.emit($event)"
        (nodeSelect)="nodeSelect.emit($event)"
        (keyNavigation)="keyNavigation.emit($event)"
      />
    }
  </div>
}
