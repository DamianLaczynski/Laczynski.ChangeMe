<div class="ds-sidebar">
  <div class="ds-sidebar__search">
    <app-search
      variant="filled-gray"
      placeholder="Search components..."
      [size]="'medium'"
      [(ngModel)]="searchQuery"
      [ngModelOptions]="{ standalone: true }"
    ></app-search>
  </div>
  <app-nav [items]="navItems()"></app-nav>
  <div class="ds-sidebar__theme-toggle">
    <app-button
      [fullWidth]="true"
      variant="primary"
      [icon]="themeIcon()"
      size="medium"
      (click)="onDarkModeToggle()"
    >
      {{ themeLabel() }}
    </app-button>
  </div>
</div>
