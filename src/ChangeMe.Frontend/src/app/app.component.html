@if (isAuthenticated()) {
  <div class="app-shell">
    <header class="app-shell__header">
      <nav class="app-shell__nav">
        <a class="app-shell__brand" [routerLink]="['/issues']">ChangeMe</a>

        <div class="app-shell__nav-links">
          <a
            class="app-shell__nav-link"
            [routerLink]="['/issues']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Issues
          </a>
          <a
            class="app-shell__nav-link"
            [routerLink]="['/issues', 'create']"
            routerLinkActive="active"
          >
            New issue
          </a>
          <a
            class="app-shell__nav-link"
            [routerLink]="['/notifications']"
            routerLinkActive="active"
          >
            Notifications
            @if (unreadNotificationsCount() > 0) {
              <ui-badge
                size="small"
                [text]="unreadNotificationsCount().toString()"
                shape="circular"
                variant="danger"
                [ariaLabel]="unreadNotificationsCount() + ' unread notifications'"
              />
            }
          </a>
        </div>

        <div class="app-shell__nav-actions">
          @if (currentUser()) {
            <div class="app-shell__user-info">
              <span class="app-shell__user-name">{{ currentUser()?.fullName }}</span>
              <span class="app-shell__user-email">{{ currentUser()?.email }}</span>
            </div>
          }
          <ui-button variant="secondary" appearance="outline" (click)="logout()">
            Sign out
          </ui-button>
        </div>
      </nav>
    </header>

    <main class="app-shell__main">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
