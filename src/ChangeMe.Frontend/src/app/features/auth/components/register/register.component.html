<div class="auth-page">
  <div class="auth-page__card">
    <div class="auth-page__header">
      <h1 class="auth-page__title">Create account</h1>
      <p class="auth-page__subtitle">
        Join ChangeMe and start tracking issues with your team.
      </p>
    </div>

    @if (errorMessage()) {
      <ui-message-bar
        [message]="errorMessage()"
        variant="danger"
        appearance="tint"
        [dismissible]="false"
      />
    }

    <form class="auth-page__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <ui-text
        label="First name"
        placeholder="Jan"
        autocomplete="given-name"
        formControlName="firstName"
        [required]="true"
      />
      <ui-text
        label="Last name"
        placeholder="Kowalski"
        autocomplete="family-name"
        formControlName="lastName"
        [required]="true"
      />
      <ui-text
        label="Email"
        placeholder="you@example.com"
        autocomplete="email"
        formControlName="email"
        [required]="true"
      />
      <ui-password
        label="Password"
        placeholder="Create a password"
        autocomplete="new-password"
        formControlName="password"
        [required]="true"
        helpText="At least {{ authConstraints.PASSWORD_MIN_LENGTH }} characters."
      />
      <ui-password
        label="Confirm password"
        placeholder="Repeat the password"
        autocomplete="new-password"
        formControlName="confirmPassword"
        [required]="true"
        [errorText]="
          form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched
            ? 'Passwords do not match.'
            : ''
        "
      />
      <ui-button
        type="submit"
        variant="primary"
        [fullWidth]="true"
        [loading]="isSubmitting()"
        [disabled]="isSubmitting()"
      >
        Create account
      </ui-button>
    </form>

    <div class="auth-page__footer">
      <span>Already have an account?</span>
      <a [routerLink]="['/login']">Sign in</a>
    </div>
  </div>
</div>
